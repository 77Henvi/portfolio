name: Check Portfolio

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate HTML
        run: |
          npx --yes html-validate \
            --rule 'no-inline-style: off' \
            --rule 'no-autoplay: off' \
            --rule 'no-trailing-whitespace: off' \
            index.html || true